services:
    client:
        build: ./client
        env_file:
            - .env
        ports:
            - "3004:3000"
        environment:
            - PUBLIC_API_URL=${PUBLIC_API_URL}
        networks:
            - app-network

    api:
        build: ./api
        env_file:
            - .env
        ports:
            - "${API_PORT}:${API_PORT}"
        environment:
            - DATABASE_URL=${DATABASE_URL}
        networks:
            - app-network
        depends_on:
            - db

    db:
        image: postgres:15-alpine
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=${DB_NAME}
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    postgres_data:
