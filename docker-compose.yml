services:
    client:
        build:
            context: .
            dockerfile: client/Dockerfile
            args:
                - PUBLIC_API_URL=${PUBLIC_API_URL}
        container_name: pokedex-client
        volumes:
            - .:/app
            - /app/node_modules
            - /app/client/node_modules
            - /app/client/.svelte-kit
        env_file:
            - .env
        ports:
            - '3004:5173'
        command: npm run dev --workspace=client -- --host 0.0.0.0
        environment:
            - PUBLIC_API_URL=${PUBLIC_API_URL}
            - CHOKIDAR_USEPOLLING=true
            - WATCHPACK_POLLING=true
        networks:
            - app-network
        depends_on:
            - api

    api:
        build:
            context: .
            dockerfile: api/Dockerfile
        container_name: pokedex-api
        env_file:
            - .env
        ports:
            - '${API_PORT}:${API_PORT}'
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - JWT_SECRET=${JWT_SECRET}
        volumes:
            - .:/app
            - /app/node_modules
            - /app/api/node_modules
            - /app/shared/node_modules
        command: npm run dev --workspace=api
        networks:
            - app-network
        depends_on:
            - db

    db:
        image: postgres:15-alpine
        container_name: pokedex-db
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=${DB_NAME}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    postgres_data:
