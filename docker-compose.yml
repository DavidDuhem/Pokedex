services:
    client:
        build:
            context: ./client
            dockerfile: Dockerfile
        volumes:
            - ./client:/app
            - /app/node_modules
            - /app/.svelte-kit
        env_file:
            - .env
        ports:
            - '3004:5173'
        command: npm run dev -- --host 0.0.0.0
        environment:
            - PUBLIC_API_URL=${PUBLIC_API_URL}
            - CHOKIDAR_USEPOLLING=true
            - WATCHPACK_POLLING=true
        networks:
            - app-network

    api:
        build: ./api
        env_file:
            - .env
        ports:
            - '${API_PORT}:${API_PORT}'
        environment:
            - DATABASE_URL=${DATABASE_URL}
        volumes:
            - ./api:/app
            - /app/node_modules
        command: npm run dev
        networks:
            - app-network
        depends_on:
            - db

    db:
        image: postgres:15-alpine
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=${DB_NAME}
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    postgres_data:
